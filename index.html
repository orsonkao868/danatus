<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>達納特斯：元素戰鬥</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#1a1a2e;color:#eee;padding:1rem}
.card{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:1rem;margin-bottom:12px}
.pet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pet-card{background:#0f3460;border-radius:8px;padding:10px;cursor:pointer;border:2px solid transparent}
.pet-card:hover{border-color:#e94560}
.pet-card.selected{border-color:#e94560;background:#1a1a2e}
.pet-name{font-size:15px;font-weight:bold;margin-bottom:2px}
.elem-badge{font-size:11px;padding:2px 8px;border-radius:4px;display:inline-block;margin:3px 0 6px}
.fire{background:#7c2d12;color:#fed7aa}
.water{background:#1e3a5f;color:#bae6fd}
.wind{background:#14532d;color:#bbf7d0}
.thunder{background:#713f12;color:#fef08a}
.light{background:#713f12;color:#fefce8}
.dark{background:#2e1065;color:#e9d5ff}
.nature{background:#052e16;color:#86efac}
.void{background:#1c1917;color:#d6d3d1}
.stat-bar-wrap{background:#0a0a1a;border-radius:4px;height:5px;margin:2px 0 5px}
.stat-bar{height:5px;border-radius:4px}
.hp-bar{background:#10b981}
.atk-bar{background:#ef4444}
.spd-bar{background:#3b82f6}
.btn{padding:8px 16px;font-size:13px;border-radius:8px;border:none;cursor:pointer;margin:3px;font-weight:bold}
.btn-primary{background:#e94560;color:white}
.btn-primary:hover{background:#c73652}
.btn-skill{background:#7c3aed;color:white}
.btn-skill:hover{background:#6d28d9}
.btn-run{background:#374151;color:white}
.btn-run:hover{background:#1f2937}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.battle-area{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:10px}
.fighter{background:#0f3460;border-radius:8px;padding:10px;text-align:center}
.fighter-name{font-size:14px;font-weight:bold;margin-bottom:4px}
.hp-text{font-size:12px;color:#9ca3af;margin-bottom:3px}
.vs{font-size:20px;font-weight:bold;color:#e94560;text-align:center}
.log{background:#0a0a1a;border-radius:8px;padding:10px;max-height:150px;overflow-y:auto;margin-bottom:10px}
.log-line{font-size:13px;color:#9ca3af;padding:2px 0;line-height:1.6;border-bottom:1px solid #1f2937}
.log-line:last-child{border-bottom:none;color:white;font-weight:bold}
.log-line.crit{color:#f87171;font-weight:bold}
.log-line.weak{color:#a78bfa}
.result-box{text-align:center;padding:14px;border-radius:8px;margin-bottom:10px}
.xp-wrap{background:#0a0a1a;border-radius:4px;height:8px;margin:5px 0}
.xp-bar{height:8px;border-radius:4px;background:#7c3aed;transition:width 0.5s}
.lv-badge{display:inline-block;background:#2e1065;color:#e9d5ff;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:bold}
.hidden{display:none}
.stat-row{font-size:12px;color:#9ca3af;line-height:1.8}
h1{text-align:center;color:#e94560;margin-bottom:1rem;font-size:22px}
</style>
</head>
<body>
<h1>達納特斯：元素戰鬥</h1>

<div id="screen-select" class="card">
  <div style="font-size:16px;font-weight:bold;margin-bottom:4px">選擇你的夥伴</div>
  <div style="font-size:13px;color:#9ca3af;margin-bottom:12px">火剋風・風剋雷・雷剋水・水剋火・光剋暗・暗剋光</div>
  <div class="pet-grid" id="pet-grid"></div>
  <button class="btn btn-primary" onclick="startGame()" id="start-btn" disabled>出發冒險</button>
</div>

<div id="screen-battle" class="hidden">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div>
        <span id="my-name" style="font-weight:bold"></span>
        <span class="lv-badge" id="my-level">Lv.1</span>
      </div>
      <div style="font-size:12px;color:#9ca3af">XP <span id="xp-text">0/100</span></div>
    </div>
    <div class="xp-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
    <div class="battle-area">
      <div class="fighter">
        <div class="fighter-name" id="p-name"></div>
        <div id="p-elem-badge"></div>
        <div class="hp-text">HP <span id="p-hp"></span></div>
        <div class="stat-bar-wrap"><div class="stat-bar hp-bar" id="p-hp-bar" style="width:100%"></div></div>
      </div>
      <div class="vs">VS</div>
      <div class="fighter">
        <div class="fighter-name" id="e-name"></div>
        <div id="e-elem-badge"></div>
        <div class="hp-text">HP <span id="e-hp"></span></div>
        <div class="stat-bar-wrap"><div class="stat-bar atk-bar" id="e-hp-bar" style="width:100%"></div></div>
      </div>
    </div>
    <div class="log" id="battle-log"></div>
    <div style="text-align:center">
      <button class="btn btn-primary" id="atk-btn" onclick="doAttack()">普通攻擊</button>
      <button class="btn btn-skill" id="skill-btn" onclick="doSkill()"></button>
      <button class="btn btn-run" id="run-btn" onclick="doRun()">逃跑</button>
    </div>
  </div>
</div>

<div id="screen-result" class="hidden">
  <div class="card">
    <div class="result-box" id="result-box">
      <div style="font-size:20px;font-weight:bold;margin-bottom:6px" id="result-title"></div>
      <div style="font-size:13px" id="result-sub"></div>
    </div>
    <div style="text-align:center">
      <button class="btn btn-primary" onclick="nextBattle()">繼續冒險</button>
      <button class="btn btn-run" onclick="backToSelect()">換隻夥伴</button>
    </div>
  </div>
</div>

<script>
const ELEM={
  fire:{name:'火',css:'fire',beats:'wind',weak:'water'},
  water:{name:'水',css:'water',beats:'fire',weak:'thunder'},
  wind:{name:'風',css:'wind',beats:'thunder',weak:'fire'},
  thunder:{name:'雷',css:'thunder',beats:'water',weak:'wind'},
  light:{name:'光',css:'light',beats:'dark',weak:'dark'},
  dark:{name:'暗',css:'dark',beats:'light',weak:'light'},
  nature:{name:'自然',css:'nature',beats:'light',weak:'fire'},
  void:{name:'無相',css:'void',beats:null,weak:null}
};
const PETS=[
  {name:'炎龍獸',elem:'fire',hp:70,atk:22,spd:15,skill:'烈焰衝擊'},
  {name:'水精靈',elem:'water',hp:90,atk:15,spd:19,skill:'海浪猛擊'},
  {name:'風鷹獸',elem:'wind',hp:75,atk:18,spd:26,skill:'疾風連斬'},
  {name:'雷獸',elem:'thunder',hp:60,atk:20,spd:24,skill:'閃電衝'},
  {name:'聖光獸',elem:'light',hp:80,atk:17,spd:18,skill:'聖光護盾'},
  {name:'暗影狼',elem:'dark',hp:72,atk:21,spd:20,skill:'暗夜刺殺'},
  {name:'草木精',elem:'nature',hp:85,atk:16,spd:17,skill:'藤蔓纏繞'},
  {name:'燒雞',elem:'void',hp:78,atk:19,spd:22,skill:'靈魂衝擊'}
];
const ENEMIES=[
  {name:'岩石獸',elem:'wind',hp:50,atk:12,spd:10},
  {name:'暗影蟲',elem:'dark',hp:58,atk:14,spd:15},
  {name:'火焰蛇',elem:'fire',hp:55,atk:17,spd:14},
  {name:'冰晶熊',elem:'water',hp:80,atk:13,spd:8},
  {name:'雷鳥',elem:'thunder',hp:52,atk:16,spd:22},
  {name:'聖殿衛士',elem:'light',hp:90,atk:18,spd:14},
  {name:'自然守護者',elem:'nature',hp:85,atk:15,spd:16},
  {name:'古龍王',elem:'fire',hp:120,atk:24,spd:18}
];
let selIdx=-1,player=null,enemy=null,pHp=0,eHp=0,pMaxHp=0,eMaxHp=0;
let pShield=0,eSlowed=false,lv=1,xp=0,xpNeed=100,bc=0,skillUsed=false,busy=false;

function elemBadge(e){const el=ELEM[e];return`<span class="elem-badge ${el.css}">${el.name}屬性</span>`;}
function statBar(v,max,cls){const p=Math.max(0,Math.round(v/max*100));return`<div class="stat-bar-wrap"><div class="stat-bar ${cls}" style="width:${p}%"></div></div>`;}
function getMultiplier(a,d){if(a==='void')return 1;const ae=ELEM[a];if(!ae)return 1;if(ae.beats===d)return 1.6;const de=ELEM[d];if(de&&de.beats===a)return 0.65;return 1;}
function calcDmg(atk,bonus,ae,de,ignore){const base=Math.round(atk*(0.85+Math.random()*0.3)*bonus);const m=ignore?1:getMultiplier(ae,de);return Math.max(1,Math.round(base*m));}
function elemNote(a,d){const m=getMultiplier(a,d);if(m>1)return' 【剋制！】';if(m<1)return' 【效果不佳】';return'';}

function buildPetGrid(){
  const g=document.getElementById('pet-grid');g.innerHTML='';
  PETS.forEach((p,i)=>{
    const el=ELEM[p.elem];
    g.innerHTML+=`<div class="pet-card" onclick="selectPet(${i})" id="pc${i}">
      <div class="pet-name">${p.name}</div>
      <span class="elem-badge ${el.css}">${el.name}屬性</span>
      <div class="stat-row">HP ${statBar(p.hp,100,'hp-bar')}攻擊 ${statBar(p.atk,30,'atk-bar')}速度 ${statBar(p.spd,30,'spd-bar')}</div>
      <div style="font-size:11px;color:#6b7280">必殺：${p.skill}</div>
    </div>`;
  });
}

function selectPet(i){selIdx=i;document.querySelectorAll('.pet-card').forEach((c,j)=>c.classList.toggle('selected',j===i));document.getElementById('start-btn').disabled=false;}

function startGame(){if(selIdx<0)return;player={...PETS[selIdx]};lv=1;xp=0;bc=0;updateLvUI();loadBattle();}

function loadBattle(){
  bc++;
  const ei=Math.min(bc-1,ENEMIES.length-1);
  enemy={...ENEMIES[bc>ENEMIES.length?ENEMIES.length-1:ei]};
  const sc=1+(bc-1)*0.18;
  enemy.hp=Math.round(enemy.hp*sc);enemy.atk=Math.round(enemy.atk*sc);
  pHp=player.hp+(lv-1)*10;pMaxHp=pHp;eHp=enemy.hp;eMaxHp=eHp;
  pShield=0;eSlowed=false;skillUsed=false;busy=false;
  show('screen-battle');hide('screen-select');hide('screen-result');
  document.getElementById('p-name').textContent=player.name;
  document.getElementById('e-name').textContent=enemy.name;
  document.getElementById('my-name').textContent=player.name;
  document.getElementById('p-elem-badge').innerHTML=elemBadge(player.elem);
  document.getElementById('e-elem-badge').innerHTML=elemBadge(enemy.elem);
  document.getElementById('skill-btn').textContent=player.skill;
  updateHP();setLog([`遭遇了野生的 ${enemy.name}（${ELEM[enemy.elem].name}屬性）！`]);setBtns(true);
}

function updateHP(){
  const ps=pShield>0?` [護盾:${pShield}]`:'';
  document.getElementById('p-hp').textContent=Math.max(0,pHp)+'/'+pMaxHp+ps;
  document.getElementById('e-hp').textContent=Math.max(0,eHp)+'/'+eMaxHp;
  document.getElementById('p-hp-bar').style.width=Math.max(0,Math.round(pHp/pMaxHp*100))+'%';
  document.getElementById('e-hp-bar').style.width=Math.max(0,Math.round(eHp/eMaxHp*100))+'%';
}

function updateLvUI(){
  document.getElementById('my-level').textContent='Lv.'+lv;
  document.getElementById('xp-text').textContent=xp+'/'+xpNeed;
  document.getElementById('xp-bar').style.width=Math.min(100,Math.round(xp/xpNeed*100))+'%';
}

function addLog(line,cls=''){const log=document.getElementById('battle-log');const d=document.createElement('div');d.className='log-line'+(cls?' '+cls:'');d.textContent=line;log.appendChild(d);log.scrollTop=log.scrollHeight;}
function setLog(lines){document.getElementById('battle-log').innerHTML='';lines.forEach(l=>addLog(l));}
function setBtns(on){['atk-btn','skill-btn','run-btn'].forEach(id=>{document.getElementById(id).disabled=!on;});if(on)document.getElementById('skill-btn').disabled=skillUsed;}

function applyDmgToEnemy(dmg,logs){
  eHp-=dmg;updateHP();
  if(eHp<=0){
    const g=Math.round(35+bc*12+Math.random()*20);xp+=g;
    logs.push(`${enemy.name} 被擊敗！獲得 ${g} XP`);setLog(logs);setBtns(false);
    while(xp>=xpNeed){xp-=xpNeed;lv++;xpNeed=Math.round(xpNeed*1.3);}
    updateLvUI();setTimeout(()=>showResult(true),800);return true;
  }return false;
}

function enemyTurn(logs){
  const ea=Math.round(enemy.atk*(eSlowed?0.7:1));
  let dmg=calcDmg(ea,1,enemy.elem,player.elem,false);
  if(pShield>0){const ab=Math.min(pShield,dmg);pShield-=ab;dmg-=ab;if(ab>0)logs.push(`護盾吸收了 ${ab} 傷害！`);}
  if(dmg>0){pHp-=dmg;const note=elemNote(enemy.elem,player.elem);logs.push(`${enemy.name} 攻擊！造成 ${dmg} 傷害${note}`);}
  eSlowed=false;updateHP();
  if(pHp<=0){logs.push('你的夥伴倒下了...');setLog(logs);setBtns(false);setTimeout(()=>showResult(false),800);return true;}
  return false;
}

function doAttack(){
  if(busy)return;busy=true;setBtns(false);
  const dmg=calcDmg(player.atk+(lv-1)*3,1,player.elem,enemy.elem,false);
  const note=elemNote(player.elem,enemy.elem);
  const cls=note.includes('剋制')?'crit':note.includes('不佳')?'weak':'';
  const logs=[`${player.name} 攻擊！造成 ${dmg} 傷害${note}`];
  if(!applyDmgToEnemy(dmg,logs))if(!enemyTurn(logs))setLog(logs);
  busy=false;if(pHp>0&&eHp>0)setBtns(true);
}

function doSkill(){
  if(busy||skillUsed)return;busy=true;skillUsed=true;setBtns(false);
  const atk=player.atk+(lv-1)*3;let logs=[];const sk=player.skill;
  if(sk==='烈焰衝擊'){const d=calcDmg(atk,2,player.elem,enemy.elem,false);logs=[`使用「${sk}」！造成 ${d} 大傷害！`];applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  else if(sk==='海浪猛擊'){const d=calcDmg(atk,1.3,player.elem,enemy.elem,false);pHp=Math.min(pMaxHp,pHp+15);logs=[`使用「${sk}」！造成 ${d} 傷害，回復 15 HP！`];updateHP();applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  else if(sk==='疾風連斬'){const d1=calcDmg(atk,0.9,player.elem,enemy.elem,false);const d2=calcDmg(atk,0.9,player.elem,enemy.elem,false);logs=[`使用「${sk}」！第一擊 ${d1}！`];if(!applyDmgToEnemy(d1,logs)){logs.push(`第二擊 ${d2}！`);applyDmgToEnemy(d2,logs)||enemyTurn(logs)||setLog(logs);}}
  else if(sk==='閃電衝'){const d=calcDmg(atk,1.8,player.elem,enemy.elem,false);logs=[`先手！使用「${sk}」！造成 ${d} 傷害！`];applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  else if(sk==='聖光護盾'){const d=calcDmg(atk,1.2,player.elem,enemy.elem,false);pShield+=20;logs=[`使用「${sk}」！造成 ${d} 傷害，獲得 20 護盾！`];updateHP();applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  else if(sk==='暗夜刺殺'){const d=calcDmg(atk,1.5,player.elem,enemy.elem,true);logs=[`使用「${sk}」！無視元素造成 ${d} 傷害！`];applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  else if(sk==='藤蔓纏繞'){const d=calcDmg(atk,1.3,player.elem,enemy.elem,false);eSlowed=true;logs=[`使用「${sk}」！造成 ${d} 傷害，敵方減速！`];applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  else if(sk==='靈魂衝擊'){const d=calcDmg(atk,1.8,player.elem,enemy.elem,true);logs=[`使用「${sk}」！靈魂共鳴，造成 ${d} 傷害！`];applyDmgToEnemy(d,logs)||enemyTurn(logs)||setLog(logs);}
  busy=false;if(pHp>0&&eHp>0)setBtns(true);
}

function doRun(){
  if(busy)return;
  const spd=eSlowed?enemy.spd*0.7:enemy.spd;
  if(Math.random()<(player.spd>spd?0.8:0.45)){addLog('成功逃跑了！');setBtns(false);setTimeout(()=>showResult('run'),600);}
  else{const logs=['逃跑失敗！'];enemyTurn(logs);setLog(logs);}
}

function showResult(win){
  hide('screen-battle');show('screen-result');
  const t=document.getElementById('result-title');
  const s=document.getElementById('result-sub');
  const box=document.getElementById('result-box');
  if(win===true){t.textContent='勝利！';s.textContent=`擊敗 ${enemy.name}！Lv.${lv} ・ XP ${xp}/${xpNeed}`;box.style.background='#064e3b';t.style.color='#6ee7b7';}
  else if(win===false){t.textContent='戰敗了...';s.textContent='再試一次！';box.style.background='#7f1d1d';t.style.color='#fca5a5';}
  else{t.textContent='成功逃跑';s.textContent='逃到安全的地方';box.style.background='#1f2937';t.style.color='#d1d5db';}
}

function nextBattle(){pHp=pHp<=0?pMaxHp:Math.min(pMaxHp,pHp+Math.round(pMaxHp*0.3));loadBattle();}
function backToSelect(){hide('screen-battle');hide('screen-result');show('screen-select');document.querySelectorAll('.pet-card').forEach(c=>c.classList.remove('selected'));selIdx=-1;document.getElementById('start-btn').disabled=true;}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

buildPetGrid();
</script>
</body>
</html>
